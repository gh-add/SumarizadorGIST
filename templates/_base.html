<!DOCTYPE html>
<html lang="pt-br" class="h-100">
    {% load static %}

    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>SumarizadorGIST</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
        <link href="{% static 'css/custom.css' %}" rel="stylesheet" />
    </head>
    
    <body class="d-flex flex-column min-vh-100 bg-gray-300">
        
        <div class="d-flex flex-grow-1" id="wrapper">
            
            {% include '_nav.html' %}
            
            <div id="page-content-wrapper" class="d-flex flex-column flex-grow-1 w-100 position-relative">
                
                {% include '_header.html' %}
                
                <div id="main-content" class="w-100 flex-grow-1">
                     {% block content %}
                     {% endblock %}
                </div>
                
            </div>
        </div>

    </body>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/scripts.js' %}"></script>
    <script src="{% static 'js/ajax.js' %}"></script>
    {% block extra_scripts %}
    {% endblock %}
</html>
