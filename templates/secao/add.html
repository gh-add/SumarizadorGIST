{% extends '_base.html' %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: calc(100vh - 100px);">
  <div class="col-12 col-md-6 col-lg-4">

    <form id="form-secao" method="POST" enctype="multipart/form-data" class="w-100">
      {% csrf_token %}

      <div class="mb-3 text-center">
        <div class="d-flex justify-content-center">
          <select name="tipo_entrada" id="id_tipo_entrada" class="form-select form-select-lg mb-3" style="max-width: 500px;">
            <option value="url">URL</option>
            <option value="arquivo">Arquivo</option>
          </select>
        </div>
      </div>

      <div class="mb-3 text-center" id="campo-url">
        <label for="id_url" class="form-label">URL</label>
        <div class="d-flex justify-content-center">
          <input type="url" name="url" id="id_url" class="form-control form-control-lg mb-3" placeholder="Digite a URL..." style="max-width: 500px;">
        </div>
      </div>

      <div class="mb-3 text-center" id="campo-arquivo">
        <label for="id_arquivo" class="form-label">Arquivo</label>
        <div class="d-flex justify-content-center">
          <input type="file" name="arquivo" id="id_arquivo" class="form-control form-control-lg mb-3" style="max-width: 500px;">
        </div>
      </div>

      <div class="d-flex justify-content-center">
        <button type="submit" class="btn btn-primary">Salvar</button>
      </div>

    </form>

  </div>
</div>
{% endblock %}
