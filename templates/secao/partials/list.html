{% for secao in secoes %}
<div class="d-flex align-items-center justify-content-between list-group-item  list-group-item-action list-group-item-light p-3 rounded border-0 w-100">

    <a href="{% url 'secao_detail' secao.id %}"
       class="text-decoration-none text-dark flex-grow-1"
       style="min-width: 0; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;">
        {{ secao.nome }}
    </a>

    <button class="btn ms-0 toggle-menu p-1" type="button" aria-label="Opções">
        <i class="bi bi-three-dots-vertical"></i>
    </button>

    <div class="menu-opcoes d-none">
        <form class="form-excluir" action="{% url 'secao_delete' secao.id %}" method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-sm text-danger w-100 ">
                <i class="bi bi-trash"></i><span class="ms-1">Excluir</span>
            </button>
        </form>
    </div>

</div>
{% endfor %}
